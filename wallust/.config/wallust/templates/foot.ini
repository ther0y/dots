# Foot Config Template - Managed by Wallust

[main]
font=JetBrainsMono Nerd Font:size=18
pad=8x0
# These moved from [window] to [main]
initial-window-size-chars=80x20

[cursor]
style=block
blink=yes

[colors]
alpha=0.8
background={{background|strip}}
foreground={{foreground|strip}}

# New way to define cursor color (text_color cursor_color)
cursor={{background|strip}} {{color5|strip}}

## Selection
selection-background={{foreground|strip}}
selection-foreground={{background|strip}}

## Normal colors (0-7)
regular0={{color0|strip}}
regular1={{color1|strip}}
regular2={{color2|strip}}
regular3={{color3|strip}}
regular4={{color4|strip}}
regular5={{color5|strip}}
regular6={{color6|strip}}
regular7={{color7|strip}}

## Bright colors (8-15)
bright0={{color8|strip}}
bright1={{color9|strip}}
bright2={{color10|strip}}
bright3={{color11|strip}}
bright4={{color12|strip}}
bright5={{color13|strip}}
bright6={{color14|strip}}
bright7={{color15|strip}}

# Border is now a simple value under [main] or defined globally
# In newer versions, it's often better to handle borders via Hyprland
