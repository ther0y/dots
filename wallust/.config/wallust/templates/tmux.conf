{# wallust template: tmux.conf #}

# --- General Style ---
set -g status-position bottom
set -g status-justify left
set -g status-style "bg={{color1}},fg={{foreground}}"

# --- Message Style (Command Mode) ---
set -g message-style "bg={{color6}},fg={{background}},bold"

# --- Pane Borders ---
set -g pane-border-style "fg={{color8}}"
set -g pane-active-border-style "fg={{color6}}"

# --- Window Tabs ---
# Inactive window
setw -g window-status-style "fg={{color7}},bg={{color1}}"
setw -g window-status-format " #I:#W "

# Active window
setw -g window-status-current-style "fg={{background}},bg={{color5}},bold"
setw -g window-status-current-format " #I:#W "

# Refresh dynamic modules every 5 seconds
set -g status-interval 5

# --- Status Bar Modules ---
# Left: Session Name
set -g status-left "#[bg={{color6}},fg={{background}},bold]  󰲋 #S  "
set -g status-left-length 30

# Right: CPU | RAM | Vol | Host | Date | Time
set -g status-right "#[bg={{color2}},fg={{background}}]  󰻠 #(grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$4+$5} END {printf \"%.0f%%%%\", u*100/t}')  #[bg={{color3}},fg={{background}}]  󰍛 #(free -h | awk '/^Mem:/{print $3\"/\"$2}')  #[bg={{color4}},fg={{background}}]  󰕾 #(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{printf \"%.0f%%%%\", $2*100}')  #[bg={{color5}},fg={{background}}]  󰒋 #h  #[bg={{color6}},fg={{background}}]  󰃭 %d %b   %H:%M  "
set -g status-right-length 120
