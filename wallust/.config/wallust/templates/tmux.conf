{# wallust template: tmux.conf #}

# --- General Style ---
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg={{foreground}}" # 'default' makes it transparent to match Ghostty

# --- Message Style (Command Mode) ---
set -g message-style "bg={{color2}},fg={{background}},bold"

# --- Pane Borders ---
# Use color8 (Grey) for inactive and color5 (Magenta) for active to match Ghostty dividers
set -g pane-border-style "fg={{color8}}"
set -g pane-active-border-style "fg={{color5}}"

# --- Window Tabs (The "Smarter" Look) ---
# Inactive window: subtle foreground
setw -g window-status-style "fg={{color7}},bg=default"
setw -g window-status-format " #I:#W "

# Active window: The Powerline "Pill"
setw -g window-status-current-style "fg={{color2}},bg=default,bold"
setw -g window-status-current-format "#[fg={{color2}}]#[bg={{color2}},fg={{background}}]#I:#W#[bg=default,fg={{color2}}]"

# --- Status Bar Modules ---
# Left: Session Name
set -g status-left "#[fg={{color1}}]#[bg={{color1}},fg={{background}},bold] 󰲋 #S #[bg=default,fg={{color1}}]  "
set -g status-left-length 20

# Right: Time & Hostname (Matching your Starship Lavender/Sapphire vibes)
set -g status-right "#[fg={{color4}}]#[bg={{color4}},fg={{background}}] 󰒋 #h #[fg={{color12}}]#[bg={{color12}},fg={{background}}]  %H:%M #[fg={{color12}}]"
set -g status-right-length 50