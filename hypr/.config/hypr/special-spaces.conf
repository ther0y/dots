# -----------------------------------------------------
# 🛠️ SPECIAL WORKSPACES (SCRATCHPADS) CONFIG
# -----------------------------------------------------

$toggle = ~/.config/hypr/scripts/toggle_app

# -----------------------------------------------------

# Notes Space
$noteApp = obsidian
bind = CTRL ALT, q, exec, $toggle notes obsidian $noteApp
windowrule {
    name = obsidian
    workspace = special:notes
    match:class = ^(obsidian)$
    float = true
    center = true
    size = 3200 1800
}

# -----------------------------------------------------

$clickup = webapp-toggle "https://app.clickup.com/6913006/home"
bind = CTRL ALT, 2, exec, $clickup
windowrule {
  name = clickup
  workspace = special:tasks
  match:class = ^(chrome-.*(clickup).*)$
  float = true
  center = true
  size = 3200 1800
}

# -----------------------------------------------------

$chat = webapp-toggle "https://chat.google.com/u/1/"
bind = CTRL ALT, 1, exec, $chat
windowrule {
  name = chat
  workspace = special:chat
  match:class = ^(chrome-.*(chat.google).*)$
  float = true
  center = true
  size = 3200 1800
}

# -----------------------------------------------------

$calendar = webapp-toggle "https://calendar.google.com/calendar/u/1/r/week?pli=1"
bind = CTRL ALT, 3, exec, $calendar
windowrule {
  name = calendar
  workspace = special:calendar
  match:class = ^(chrome-.*(calendar.google).*)$
  float = true
  center = true
  size = 3200 1800
}

# -----------------------------------------------------

# AI Space
$chatgpt = webapp-toggle "https://chatgpt.com?x_as_app=true"
$gemini = webapp-toggle "https://gemini.google.com?x_as_app=true"
$cmd = $chatgpt & $gemini

bind = CTRL ALT, W, exec, $cmd
windowrule = workspace special:ai, match:class ^(chrome-(chatgpt|gemini)(\.|__).*)$

# -----------------------------------------------------

# Yazi Space
$term_title = yazi
$term_cmd = foot -T $term_title -e yazi
windowrule {
  name = yazi
  workspace = special:yazi
  match:title = ^($term_title)$
  float = true
  size = 3200 1800
  center = true
}
bind = $hyper, F, exec, $toggle yazi yazi "$term_cmd"

# -----------------------------------------------------

# Lazygit Space
$term_title = lazygit
$term_cmd = foot -T $term_title -e lazygit
windowrule = float on, match:title ^(lazygit)$
windowrule = size 3200 1800, match:title ^(lazygit)$
windowrule = center on, match:title ^(lazygit)$
windowrule = workspace special:lazygit, match:title ^(lazygit)$
bind = $hyper, G, exec, $toggle lazygit lazygit "$term_cmd"

# -----------------------------------------------------
decoration {
    dim_special = 0.25
    blur {
    }
}

$term_title = obsidian-mux
$term_cmd = foot -T obsidian-mux -e nvim $HOME/Notes/04\ -\ Planner/Daily\ Notes/$(date +%Y)/$(date +%m)/$(date +%Y-%m-%d).md

windowrule {
  name = obsidian-mux
  workspace = special:obsidian-mux
  match:title = ^($term_title)$
  float = true
  size = 2000 1600
  center = true
  opacity = 0.95
  xray = off
  rounding = 8
  rounding_power = 2
}
bind = CTRL ALT, D, exec, $toggle obsidian-mux obsidian-mux "$term_cmd"

# -----------------------------------------------------

# Lazydocker Space
$term_title = lazydocker
$term_cmd = foot --title=$term_title -e lazydocker
windowrule {
  name = lazygit
  workspace = special:lazydocker
  match:title = ^($term_title)$
  float = true
  size = 3200 1800
  center = true
}
bind = $hyper, D, exec, $toggle lazydocker lazydocker "$term_cmd"

# -----------------------------------------------------

# Btop Space
$term_title = btop
$term_cmd = foot --title=$term_title -e btm
windowrule {
  name = btop
  workspace = special:btop
  match:title = ^($term_title)$
  float = true
  size = 3200 1800
  center = true
}
bind = $hyper, B, exec, $toggle btop btop "$term_cmd"

# -----------------------------------------------------

# RobCo Term Space
$term_class = ghostty-overlay
$term_cmd = ghostty --title=$term_class --custom-shader=~/.config/ghostty/shaders/fallout.glsl
windowrule {
  name = ghostty-overlay
  workspace = special:terminal
  match:title = ^($term_class)$
  float = true
  size = 1800 1800
  move = 7.5% 5%
}
bind = $hyper, X, exec, $toggle terminal ghostty-overlay "$term_cmd"
