# See https://wiki.hypr.land/Configuring/Binds/
# $mainMod and $hyper are defined in variables.conf

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, KP_Enter, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = ALT, Space, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod ALT, Backspace, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = SUPER, SPACE, exec, hyprctl switchxkblayout kanata next
bind = $mainMod, R, exec, ~/.config/waybar/launch.sh

bind = $mainMod, G, exec, foot -T "$floatingTermClass" -e ~/.local/bin/tmux_launcher
bind = $mainMod, U, exec, foot -T "$floatingTermClass" -e ~/.local/bin/code_launcher

# bind = $hyper, 3, exec, grim -o $(hyprctl monitors -j | jq -r '.[] | select(.focused) | .name') - | swappy -f - -o - | wl-copy
# bind = $hyper, 4, exec, grim -g "$(slurp)" - | swappy -f - -o - | wl-copy
# Screenshot a region and open in Satty
bind = $hyper, 3, exec, grim -o $(hyprctl monitors -j | jq -r '.[] | select(.focused) | .name') - | satty --filename -

# Screenshot the whole screen and open in Satty
bind = $hyper, 4, exec, grim -g "$(slurp)" - |  satty --filename -

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# swap windows
bind = $mainMod ALT, down , movewindow, d
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r

bind = $mainMod, E, submap, resize

submap = resize
    binde = , right,  resizeactive, 10 0
    binde = , left,   resizeactive, -10 0
    binde = , up,     resizeactive, 0 -10
    binde = , down,   resizeactive, 0 10
    bind = , escape, submap, reset 
submap = reset

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


bind = SUPER, L, exec, $HOME/.config/rofi/powermenu/type-6/powermenu.sh
bind = SUPER, grave, fullscreen, 1

# Mac-style Universal Shortcuts (Ghostty override above)
bind = SUPER, C, sendshortcut, CTRL_SHIFT, C, class:^(com.mitchellh.ghostty)$
bind = SUPER, V, sendshortcut, CTRL_SHIFT, V, class:^(com.mitchellh.ghostty)$
bind = SUPER, C, sendshortcut, CTRL, C, activewindow
bind = SUPER, V, sendshortcut, CTRL, V, activewindow
bind = SUPER, X, sendshortcut, CTRL, X, activewindow
bind = SUPER, A, sendshortcut, CTRL, A, activewindow
bind = SUPER, Z, sendshortcut, CTRL, Z, activewindow
bind = SUPER, S, sendshortcut, CTRL, S, activewindow


# Web App Launchs
bind = SUPER ALT, G, exec, webapp-toggle "https://chat.google.com/u/1/"
bind = SUPER ALT, Y, exec, webapp-toggle "https://www.youtube.com?x_as_app=true"
bind = SUPER ALT, A, exec, webapp-toggle "https://chatgpt.com?x_as_app=true"
bind = SUPER ALT, I, exec, webapp-toggle "https://gemini.google.com?x_as_app=true"
bind = SUPER ALT, U, exec, webapp-toggle "https://app.clickup.com/6913006/home"
bind = SUPER ALT, C, exec, webapp-toggle "https://calendar.google.com/calendar/u/1/r/week?pli=1"
bind = SUPER ALT, X, exec, webapp-toggle "https://x.com"

bind = $hyper, W, exec, waypaper
