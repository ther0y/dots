background {
    monitor =
    path = /home/masood/Pictures/my-wallpapers/ny2.jpg   # آدرس والپیپرت را اینجا بزن
    blur_passes = 2
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -20
    halign = center
    valign = center
    status_command = echo "Keyboard: $(hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap')"
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

label {
    text = $LAYOUT
    position = -50, 160
    halign = right
    valign = bottom
    onclick = hyprctl switchxkblayout current next
}

