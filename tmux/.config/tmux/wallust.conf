

# --- General Style ---
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#842920,fg=#FDEAF8"

# --- Message Style (Command Mode) ---
set -g message-style "bg=#F86BD6,fg=#131216,bold"

# --- Pane Borders ---
set -g pane-border-style "fg=#AA97A6"
set -g pane-active-border-style "fg=#F86BD6"

# --- Window Tabs ---
# Inactive window
setw -g window-status-style "fg=#F3D8ED,bg=#842920"
setw -g window-status-format " #I:#W "

# Active window
setw -g window-status-current-style "fg=#131216,bg=#1FBFC5,bold"
setw -g window-status-current-format " #I:#W "

# Refresh dynamic modules every 5 seconds
set -g status-interval 5

# --- Status Bar Modules ---
# Left: Session Name
set -g status-left "#[bg=#F86BD6,fg=#131216,bold]  󰲋 #S  "
set -g status-left-length 30

# Right: CPU | RAM | Vol | Host | Date | Time
set -g status-right "#[bg=#7D25E5,fg=#131216]  󰻠 #(grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$4+$5} END {printf \"%.0f%%%%\", u*100/t}')  #[bg=#0E7FCD,fg=#131216]  󰍛 #(free -h | awk '/^Mem:/{print $3\"/\"$2}')  #[bg=#7544A1,fg=#131216]  󰕾 #(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{printf \"%.0f%%%%\", $2*100}')  #[bg=#1FBFC5,fg=#131216]  󰒋 #h  #[bg=#F86BD6,fg=#131216]  󰃭 %d %b   %H:%M  "
set -g status-right-length 120
