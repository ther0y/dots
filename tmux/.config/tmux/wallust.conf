

# --- General Style ---
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#F5F4F5" # 'default' makes it transparent to match Ghostty

# --- Message Style (Command Mode) ---
set -g message-style "bg=#456382,fg=#0E0E0F,bold"

# --- Pane Borders ---
# Use color8 (Grey) for inactive and color5 (Magenta) for active to match Ghostty dividers
set -g pane-border-style "fg=#A2A2A2"
set -g pane-active-border-style "fg=#E27BE2"

# --- Window Tabs (The "Smarter" Look) ---
# Inactive window: subtle foreground
setw -g window-status-style "fg=#E8E7E8,bg=default"
setw -g window-status-format " #I:#W "

# Active window: The Powerline "Pill"
setw -g window-status-current-style "fg=#456382,bg=default,bold"
setw -g window-status-current-format "#[fg=#456382]#[bg=#456382,fg=#0E0E0F]#I:#W#[bg=default,fg=#456382]"

# --- Status Bar Modules ---
# Left: Session Name
set -g status-left "#[fg=#43677F]#[bg=#43677F,fg=#0E0E0F,bold] 󰲋 #S #[bg=default,fg=#43677F]  "
set -g status-left-length 20

# Right: Time & Hostname (Matching your Starship Lavender/Sapphire vibes)
set -g status-right "#[fg=#6969C0]#[bg=#6969C0,fg=#0E0E0F] 󰒋 #h #[fg=#6969C0]#[bg=#6969C0,fg=#0E0E0F]  %H:%M #[fg=#6969C0]"
set -g status-right-length 50