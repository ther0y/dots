

# --- General Style ---
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#2D72B0,fg=#FEF1DE"

# --- Message Style (Command Mode) ---
set -g message-style "bg=#FBBB58,fg=#131311,bold"

# --- Pane Borders ---
set -g pane-border-style "fg=#AB9F8B"
set -g pane-active-border-style "fg=#FBBB58"

# --- Window Tabs ---
# Inactive window
setw -g window-status-style "fg=#F5E3C7,bg=#2D72B0"
setw -g window-status-format " #I:#W "

# Active window
setw -g window-status-current-style "fg=#131311,bg=#8A72E3,bold"
setw -g window-status-current-format " #I:#W "

# Refresh dynamic modules every 5 seconds
set -g status-interval 5

# --- Status Bar Modules ---
# Left: Session Name
set -g status-left "#[bg=#FBBB58,fg=#131311,bold]  󰲋 #S  "
set -g status-left-length 30

# Right: CPU | RAM | Vol | Host | Date | Time
set -g status-right "#[bg=#B45E28,fg=#131311]  󰻠 #(grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$4+$5} END {printf \"%.0f%%%%\", u*100/t}')  #[bg=#569144,fg=#131311]  󰍛 #(free -h | awk '/^Mem:/{print $3\"/\"$2}')  #[bg=#DA3E8D,fg=#131311]  󰕾 #(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{printf \"%.0f%%%%\", $2*100}')  #[bg=#8A72E3,fg=#131311]  󰒋 #h  #[bg=#FBBB58,fg=#131311]  󰃭 %d %b   %H:%M  "
set -g status-right-length 120
